services:
  # ============================================================
  # AICatPin 前端应用
  # ============================================================
  aicatpin:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: aicatpin-frontend
    ports:
      - "1420:1420"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=http://supabase:54321
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-anon-key}
      - VITE_OLLAMA_URL=http://ollama:11434
    networks:
      - aicatpin-network
    depends_on:
      - supabase
      - ollama
    restart: unless-stopped

  # ============================================================
  # Supabase 数据库
  # ============================================================
  supabase:
    image: supabase/supabase-db:latest
    container_name: aicatpin-supabase
    ports:
      - "5432:5432"
      - "54321:8000"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
      - supabase-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - aicatpin-network
    restart: unless-stopped

  # ============================================================
  # Ollama AI 服务
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: aicatpin-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - aicatpin-network
    restart: unless-stopped

  # ============================================================
  # Supabase Studio (可选)
  # ============================================================
  studio:
    image: supabase/studio:latest
    container_name: aicatpin-studio
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=http://supabase:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-anon-key}
    networks:
      - aicatpin-network
    depends_on:
      - supabase
    restart: unless-stopped
    profiles:
      - studio

# ============================================================
# 网络配置
# ============================================================
networks:
  aicatpin-network:
    driver: bridge

# ============================================================
# 数据卷
# ============================================================
volumes:
  supabase-data:
  ollama-data: