services:
  # ============================================================
  # AICatPin 前端应用
  # ============================================================
  aicatpin:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: aicatpin-frontend
    ports:
      - "1420:1420"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped